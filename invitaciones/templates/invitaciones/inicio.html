<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Invitaciones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f5f0;
            margin: 0;
            padding: 0;
        }

        .contenedor {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 0 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #8b5e3c;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #444;
        }

        .botones {
            margin-top: 30px;
        }

        .botones a {
            display: inline-block;
            margin: 10px;
            padding: 14px 24px;
            background: #8b5e3c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 17px;
        }

        .botones a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Sistema de Invitaciones de Boda</h1>
        <p>Aquí administrarás tus invitaciones, confirmaciones y asistencia.</p>

        <div class="botones">
            <a href="/admin/">Ir al Admin</a>
            <a href="/dashboard/">Ver Dashboard</a>
        </div>
    </div>
</body>
</html>
